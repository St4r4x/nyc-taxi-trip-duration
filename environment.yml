name: nyc-taxi

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip

  # Données & SQL
  - pandas=2.2
  - numpy=1.26
  - sqlalchemy=2.0

  # Machine learning
  - scikit-learn=1.4
  - lightgbm=4.3
  - xgboost=2.0

  # Visualisation
  - matplotlib=3.8
  - seaborn=0.13

  # Notebooks
  - jupyter
  - ipykernel
  - ipywidgets

  # Utilitaires
  - tqdm
  - python-dotenv

  - pip:
    - haversine
    - streamlit
    - pydeck
